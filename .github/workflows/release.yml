name: Publish release
# Release を作成し、同梱の SolarForge-<version>.rbz をアセットに付ける。
# 自動アップデータ(update.rb)は releases/latest の .rbz を参照するため Release 化が必須。
# 手動実行(workflow_dispatch)ではCIトークンがタグ v<version> も同時に作成する。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'version without v (例: 0.3.1)'
        required: true
        default: '0.3.1'
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release with rbz asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
            EXTRA="--target ${GITHUB_SHA}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            EXTRA=""
          fi
          FILE="SolarForge-${VERSION}.rbz"
          if [ ! -f "$FILE" ]; then
            echo "::error::asset $FILE not found at repo root"; ls -la; exit 1
          fi
          # ノートはリポジトリ同梱の RELEASE_NOTES.md を使う(v0.3.3〜。無ければ汎用文)
          if [ -f RELEASE_NOTES.md ]; then NOTES_ARGS="--notes-file RELEASE_NOTES.md"; else NOTES_ARGS="--notes 導入=本rbzをSketchUp拡張機能マネージャで上書き→再起動、またはプラグイン内「⬆更新」から。"; fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists — updating asset and notes"
            gh release upload "$TAG" "$FILE" --clobber
            gh release edit "$TAG" --title "SolarForge ${TAG}" $NOTES_ARGS
          else
            gh release create "$TAG" "$FILE" $EXTRA \
              --title "SolarForge ${TAG}" $NOTES_ARGS
          fi
